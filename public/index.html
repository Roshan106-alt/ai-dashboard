<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #efefef;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e0e0e0;
            --accent-green: #0a7c52;
            --accent-red: #c0392b;
            --accent-amber: #8a6200;
            --accent-blue: #1a4fa0;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #2a2a2a;
                --bg-tertiary: #3a3a3a;
                --text-primary: #e8e8e8;
                --text-secondary: #b8b8b8;
                --text-tertiary: #888888;
                --border-color: #444444;
                --accent-green: #3ecf8e;
                --accent-red: #f07070;
                --accent-amber: #f0c060;
                --accent-blue: #6ab0f5;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .header-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .last-updated {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        
        .tab-btn:hover {
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .kpi-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        
        .kpi-card:hover {
            border-color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .kpi-card.pending {
            opacity: 0.6;
        }
        
        .kpi-card.error {
            border-color: var(--accent-red);
            background: rgba(192, 57, 43, 0.05);
        }
        
        .kpi-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .kpi-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }
        
        .kpi-value.pending {
            color: var(--text-tertiary);
            font-size: 1rem;
        }
        
        .kpi-unit {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .kpi-change {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        
        .kpi-change.positive {
            color: var(--accent-green);
        }
        
        .kpi-change.negative {
            color: var(--accent-red);
        }
        
        .kpi-change.neutral {
            color: var(--text-tertiary);
        }
        
        .kpi-timestamp {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 0.5rem;
        }
        
        .errors-section {
            background: var(--bg-primary);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .errors-section h3 {
            color: var(--accent-red);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        
        .error-item {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .error-item:last-child {
            border-bottom: none;
        }
        
        .error-kpi {
            font-weight: 500;
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Trade Dashboard</h1>
            <div class="header-meta">
                <div class="last-updated">
                    <div class="status-dot"></div>
                    <span id="lastUpdate">Loading...</span>
                </div>
                <span id="totalKpis">KPIs: --</span>
                <span id="totalErrors">Errors: --</span>
            </div>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('supply')">Supply Chain</button>
            <button class="tab-btn" onclick="switchTab('adoption')">Adoption</button>
            <button class="tab-btn" onclick="switchTab('economics')">Economics</button>
            <button class="tab-btn" onclick="switchTab('infrastructure')">Infrastructure</button>
            <button class="tab-btn" onclick="switchTab('market')">Market</button>
        </div>
        
        <div id="supply" class="tab-content active">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">Supply Chain & Hardware</h2>
            <div class="kpi-grid" id="supply-grid"></div>
        </div>
        
        <div id="adoption" class="tab-content">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">Developer Adoption & Usage</h2>
            <div class="kpi-grid" id="adoption-grid"></div>
        </div>
        
        <div id="economics" class="tab-content">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">Pricing & Efficiency</h2>
            <div class="kpi-grid" id="economics-grid"></div>
        </div>
        
        <div id="infrastructure" class="tab-content">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">AI Infrastructure Spending</h2>
            <div class="kpi-grid" id="infrastructure-grid"></div>
        </div>
        
        <div id="market" class="tab-content">
            <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">Market Sentiment</h2>
            <div class="kpi-grid" id="market-grid"></div>
        </div>
        
        <div id="errors-container"></div>
    </div>
    
    <script>
        const kpiCategories = {
            supply: ['tsmc_monthly_revenue', 'fred_semi_index', 'tsmc_3nm_wafer_price', 'hbm_spot_price', 'cowos_utilization', 'ai_server_backlog'],
            adoption: ['google_trends_ai', 'github_ai_stars_top10', 'huggingface_downloads_top20', 'ai_job_postings', 'openrouter_throughput_status'],
            economics: ['api_pricing_snapshot', 'api_pricing_log', 'aa_inference_speed_tps', 'inferencemax_efficiency'],
            infrastructure: ['hyperscaler_capex_guidance', 'hyperscaler_capex_reported', 'cloud_revenue_growth', 'nvidia_dc_revenue'],
            market: ['stock_nvda', 'stock_msft', 'stock_googl', 'stock_meta', 'stock_amzn']
        };
        
        let kpiData = null;
        
        async function loadData() {
            try {
                const response = await fetch('../data/kpis.json');
                if (!response.ok) throw new Error('Failed to fetch KPI data');
                kpiData = await response.json();
                renderDashboard();
            } catch (error) {
                console.error('Error loading data:', error);
                document.body.innerHTML = '<div class="container" style="padding-top: 2rem;"><p style="color: red;">Error loading dashboard. Make sure kpis.json exists in the data folder.</p></div>';
            }
        }
        
        function renderDashboard() {
            if (!kpiData) return;
            
            const lastUpdate = new Date(kpiData.meta.last_update);
            document.getElementById('lastUpdate').textContent = `Last update: ${lastUpdate.toLocaleString()}`;
            document.getElementById('totalKpis').textContent = `KPIs: ${Object.keys(kpiData.kpis).length}`;
            document.getElementById('totalErrors').textContent = `Errors: ${kpiData.errors.length}`;
            
            Object.entries(kpiCategories).forEach(([tab, kpiNames]) => {
                const grid = document.getElementById(`${tab}-grid`);
                grid.innerHTML = '';
                
                kpiNames.forEach(kpiName => {
                    const kpi = kpiData.kpis[kpiName];
                    if (!kpi) return;
                    
                    const card = createKpiCard(kpiName, kpi);
                    grid.appendChild(card);
                });
            });
            
            renderErrors();
        }
        
        function createKpiCard(kpiName, kpi) {
            const card = document.createElement('div');
            card.className = 'kpi-card';
            
            if (kpi.value === null || kpi.status === 'pending') {
                card.classList.add('pending');
            } else if (kpi.status === 'error') {
                card.classList.add('error');
            }
            
            const displayName = formatKpiName(kpiName);
            const value = formatValue(kpi.value);
            const timestamp = kpi.timestamp ? new Date(kpi.timestamp).toLocaleDateString() : '';
            
            let changeHtml = '';
            if (kpi.change_pct !== null && kpi.change_pct !== undefined) {
                const changeClass = kpi.change_pct > 0 ? 'positive' : (kpi.change_pct < 0 ? 'negative' : 'neutral');
                const arrow = kpi.change_pct > 0 ? '↑' : (kpi.change_pct < 0 ? '↓' : '→');
                changeHtml = `<div class="kpi-change ${changeClass}">${arrow} ${Math.abs(kpi.change_pct)}%</div>`;
            }
            
            card.innerHTML = `
                <div class="kpi-label">${displayName}</div>
                <div class="kpi-value ${kpi.value === null ? 'pending' : ''}">${value}</div>
                <div class="kpi-unit">${kpi.unit}</div>
                ${changeHtml}
                ${timestamp ? `<div class="kpi-timestamp">Updated: ${timestamp}</div>` : ''}
            `;
            
            return card;
        }
        
        function formatKpiName(name) {
            return name
                .split('_')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }
        
        function formatValue(value) {
            if (value === null || value === undefined) return 'Pending';
            if (typeof value === 'number') {
                if (value > 1000000) return (value / 1000000).toFixed(1) + 'M';
                if (value > 1000) return (value / 1000).toFixed(1) + 'K';
                return value.toFixed(2);
            }
            if (typeof value === 'object') return 'See details';
            return String(value);
        }
        
        function renderErrors() {
            if (!kpiData.errors || kpiData.errors.length === 0) {
                document.getElementById('errors-container').innerHTML = '';
                return;
            }
            
            const container = document.getElementById('errors-container');
            const errorsHtml = `
                <div class="errors-section">
                    <h3>⚠ Recent Errors (Last ${Math.min(5, kpiData.errors.length)})</h3>
                    ${kpiData.errors.slice(-5).map(err => `
                        <div class="error-item">
                            <span class="error-kpi">${err.kpi}</span>: ${err.error}
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = errorsHtml;
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        window.addEventListener('load', loadData);
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
