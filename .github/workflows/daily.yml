name: Daily KPI Fetcher

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-kpis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run daily fetcher
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python fetchers/daily.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [[ -n $(git status -s) ]]; then
          git add data/kpis.json
          git commit -m "Daily KPI update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git push https://${{ github.token }}@github.com/${{ github.repository }}.git
        else
          echo "No changes to commit"
        fi
